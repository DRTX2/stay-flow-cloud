version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ['*']

  - package-ecosystem: nuget
    directory: /backend
    schedule:
      interval: weekly
    groups:
      dotnet:
        patterns: ['*']

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    groups:
      frontend:
        patterns: ['*']

  - package-ecosystem: docker
    directory: /backend/StayFlow.Api
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /backend/StayFlow.NotificationService
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: weekly
