name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"

# The .NET solution lives under backend/; run all dotnet commands from there.
defaults:
  run:
    working-directory: backend

jobs:
  build-test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      # Unit tests run pure; the integration suite spins up PostgreSQL via Testcontainers,
      # which uses the Docker daemon available on the runner.
      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

  sonar:
    name: SonarCloud analysis
    needs: build-test
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Skip when unconfigured
        if: ${{ env.SONAR_TOKEN == '' }}
        run: echo "SONAR_TOKEN not set; skipping SonarCloud analysis. Set the secret and adjust the project key/org to enable it."

      - uses: actions/checkout@v4
        if: ${{ env.SONAR_TOKEN != '' }}
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        if: ${{ env.SONAR_TOKEN != '' }}
        with:
          dotnet-version: "10.0.x"

      - uses: actions/setup-java@v4
        if: ${{ env.SONAR_TOKEN != '' }}
        with:
          distribution: temurin
          java-version: "17"

      - name: Install scanner
        if: ${{ env.SONAR_TOKEN != '' }}
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Analyze
        if: ${{ env.SONAR_TOKEN != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dotnet sonarscanner begin \
            /k:"stayflow-cloud" \
            /o:"${{ github.repository_owner }}" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml"
          dotnet build --configuration Release
          dotnet test --configuration Release --no-build \
            --collect:"XPlat Code Coverage" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover
          dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"

  docker:
    name: Build image
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Publish to GHCR only on pushes to main; PRs build the image without pushing.
      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: ${{ github.event_name == 'push' }}
          tags: ghcr.io/${{ github.repository }}-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
