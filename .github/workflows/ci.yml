name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"

# The .NET solution lives under backend/; run all dotnet commands from there.
defaults:
  run:
    working-directory: backend

jobs:
  build-test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      # Unit tests run pure; the integration suite spins up PostgreSQL via Testcontainers,
      # which uses the Docker daemon available on the runner.
      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

  frontend:
    name: Frontend build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  e2e:
    name: E2E (Playwright)
    needs: build-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      # Bring up the API and its backing services (Postgres/Redis/Mongo/RabbitMQ) via Compose.
      # The `web` service is intentionally left down so Playwright can run its own dev server on :3000.
      - name: Start backend stack
        working-directory: .
        run: docker compose up -d --build stayflow.api

      - name: Wait for API readiness
        working-directory: .
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/health/ready >/dev/null 2>&1; then
              echo "API ready"; exit 0
            fi
            echo "waiting for API ($i)…"; sleep 5
          done
          echo "API did not become ready in time"; docker compose logs stayflow.api; exit 1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Playwright starts the Next dev server on :3000 (config webServer), which proxies
      # /connect + /api/backend to the API on :8080. Defaults already point there.
      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Stop backend stack
        if: always()
        working-directory: .
        run: docker compose down -v

  sonar:
    name: SonarCloud analysis
    needs: build-test
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Skip when unconfigured
        if: ${{ env.SONAR_TOKEN == '' }}
        run: echo "SONAR_TOKEN not set; skipping SonarCloud analysis. Set the secret and adjust the project key/org to enable it."

      - uses: actions/checkout@v4
        if: ${{ env.SONAR_TOKEN != '' }}
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        if: ${{ env.SONAR_TOKEN != '' }}
        with:
          dotnet-version: "10.0.x"

      - uses: actions/setup-java@v4
        if: ${{ env.SONAR_TOKEN != '' }}
        with:
          distribution: temurin
          java-version: "17"

      - name: Install scanner
        if: ${{ env.SONAR_TOKEN != '' }}
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Analyze
        if: ${{ env.SONAR_TOKEN != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dotnet sonarscanner begin \
            /k:"stayflow-cloud" \
            /o:"${{ github.repository_owner }}" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml"
          dotnet build --configuration Release
          dotnet test --configuration Release --no-build \
            --collect:"XPlat Code Coverage" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover
          dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"

  docker:
    name: Build image
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Publish to GHCR only on pushes to main; PRs build the image without pushing.
      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: ${{ github.event_name == 'push' }}
          tags: ghcr.io/${{ github.repository }}-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
