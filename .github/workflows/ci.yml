name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Minimal permissions at the workflow level — each job that needs more
# declares its own `permissions` block. This follows the principle of
# least privilege: a compromised step in `backend` or `frontend` cannot
# write SARIF results or interact with the token registry.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: '1'
  DOTNET_NOLOGO: '1'

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    # No extra permissions needed — build and test only read the repo.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: backend/global.json

      - name: Restore
        run: dotnet restore StayFlowCloud.sln
        working-directory: backend

      - name: Build
        run: dotnet build StayFlowCloud.sln --configuration Release --no-restore
        working-directory: backend

      - name: Test
        run: dotnet test StayFlowCloud.sln --configuration Release --no-build --logger trx --results-directory TestResults --collect:"XPlat Code Coverage"
        working-directory: backend

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/TestResults
          if-no-files-found: ignore

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    # No extra permissions needed.
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          NEXT_PUBLIC_OIDC_AUTHORITY: http://localhost:8080

  security:
    name: Dependency, Secret and IaC Scan
    runs-on: ubuntu-latest
    permissions:
      # Needed only here to upload Trivy SARIF results to the Security tab.
      # Granting this at the workflow level would allow ANY job to write security
      # events — undesirable if a supply-chain attack compromises another step.
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: backend/global.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: NuGet audit
        run: dotnet restore StayFlowCloud.sln -p:NuGetAudit=true -p:NuGetAuditLevel=high
        working-directory: backend

      - name: NPM audit
        run: npm audit --audit-level=high
        working-directory: frontend

      - name: Trivy secret and IaC scan (blocking)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret,misconfig
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'

      # ── Trivy filesystem scan ──────────────────────────────────────────────
      # exit-code: '1' makes the job FAIL on HIGH or CRITICAL findings, turning
      # this into a real DevSecOps gate (not just an advisory report).
      # We run two passes:
      #   1. Table output — immediately visible in the Actions log for developers.
      #   2. SARIF output — uploaded to the GitHub Security tab on public repos.
      - name: Trivy filesystem scan (table — blocking)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

      - name: Trivy filesystem scan (SARIF — for Security tab)
        # Run even if the blocking scan above failed. Private repos without
        # code scanning/GHAS cannot upload SARIF, so skip this there.
        if: always() && github.event.repository.private == false
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          # No exit-code here — the blocking pass above already failed if needed.
          exit-code: '0'

      - name: Upload Trivy SARIF
        if: always() && github.event.repository.private == false
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [csharp, javascript-typescript]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start backend stack
        working-directory: .
        run: docker compose up -d --build stayflow.api

      - name: Wait for API readiness
        working-directory: .
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/health/ready > /dev/null 2>&1; then
              echo "API ready"
              exit 0
            fi
            echo "waiting for API ($i)"
            sleep 5
          done
          docker compose logs stayflow.api
          exit 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Stop backend stack
        if: always()
        working-directory: .
        run: docker compose down -v

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend, e2e]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            image: stayflow-api
            context: backend
            dockerfile: backend/StayFlow.Api/Dockerfile
          - name: notification-service
            image: stayflow-notification-service
            context: backend
            dockerfile: backend/StayFlow.NotificationService/Dockerfile
          - name: migration-host
            image: stayflow-migration-host
            context: backend
            dockerfile: backend/StayFlow.MigrationHost/Dockerfile
          - name: web
            image: stayflow-web
            context: frontend
            dockerfile: frontend/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          load: true
          push: false
          tags: ${{ matrix.image }}:ci
          build-args: |
            NEXT_PUBLIC_SITE_URL=http://localhost:3000
            NEXT_PUBLIC_OIDC_AUTHORITY=http://localhost:8080
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ matrix.image }}:ci
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
