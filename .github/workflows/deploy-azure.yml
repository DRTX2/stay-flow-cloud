name: Deploy Azure

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      resource_group:
        description: Azure resource group
        required: false
        default: stayflow-rg-south
      location:
        description: Azure infrastructure region
        required: false
        default: southcentralus
      environment_name:
        description: Short environment name
        required: false
        default: stayflow-prod

permissions:
  contents: read
  id-token: write
  attestations: write
  packages: write

concurrency:
  group: deploy-azure-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_TAG: ${{ github.event.workflow_run.head_sha || github.sha }}
  IMAGE_REGISTRY: ghcr.io

jobs:
  provision:
    name: Provision Infrastructure
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: production
    env:
      RESOURCE_GROUP: ${{ github.event.inputs.resource_group || vars.AZURE_RESOURCE_GROUP || 'stayflow-rg-south' }}
      ENVIRONMENT_NAME: ${{ github.event.inputs.environment_name || vars.AZURE_ENVIRONMENT_NAME || 'stayflow-prod' }}
    outputs:
      container_env_name: ${{ steps.environment.outputs.container_env_name }}
      container_env_resource_group: ${{ steps.environment.outputs.container_env_resource_group }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate existing Container Apps environment
        id: environment
        uses: azure/cli@v2
        with:
          inlineScript: |
            container_env_name="${{ vars.AZURE_CONTAINER_ENV_NAME }}"
            container_env_resource_group="${{ vars.AZURE_CONTAINER_ENV_RESOURCE_GROUP }}"
            test -n "$container_env_name"
            test -n "$container_env_resource_group"
            az containerapp env show --name "$container_env_name" --resource-group "$container_env_resource_group" --output none
            echo "container_env_name=$container_env_name" >> "$GITHUB_OUTPUT"
            echo "container_env_resource_group=$container_env_resource_group" >> "$GITHUB_OUTPUT"

  build-sign-attest:
    name: Build, Scan & Attest - ${{ matrix.name }}
    runs-on: ubuntu-latest
    environment: production
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      id-token: write
      attestations: write
      packages: write
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: api
            image: stayflow-api
            context: backend
            dockerfile: backend/StayFlow.Api/Dockerfile
          - name: web
            image: stayflow-web
            context: frontend
            dockerfile: frontend/Dockerfile
          - name: migrations
            image: stayflow-migrations
            context: backend
            dockerfile: backend/StayFlow.MigrationHost/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.IMAGE_TAG }}

      - name: Validate public URLs
        env:
          API_URL: ${{ vars.AZURE_API_URL }}
          WEB_URL: ${{ vars.AZURE_WEB_URL }}
        run: |
          [[ "$API_URL" =~ ^https://[^/]+$ ]]
          [[ "$WEB_URL" =~ ^https://[^/]+$ ]]

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve GHCR image reference
        id: image
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "ref=${IMAGE_REGISTRY}/${owner}/${{ matrix.image }}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "name=${IMAGE_REGISTRY}/${owner}/${{ matrix.image }}" >> "$GITHUB_OUTPUT"

      - name: Build image (local, pre-scan)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          load: true
          push: false
          tags: ${{ steps.image.outputs.ref }}
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ vars.AZURE_WEB_URL }}
            NEXT_PUBLIC_OIDC_AUTHORITY=${{ vars.AZURE_API_URL }}
          cache-from: type=gha,scope=azure-${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=azure-${{ matrix.name }}

      - name: Trivy image scan (blocking)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.image.outputs.ref }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

      - name: Generate SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.image.outputs.ref }}
          format: cyclonedx
          output: sbom-${{ matrix.name }}.cdx.json
          exit-code: '0'

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.name }}
          path: sbom-${{ matrix.name }}.cdx.json
          retention-days: 90

      - name: Docker login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to GHCR
        id: push
        run: |
          docker push "${{ steps.image.outputs.ref }}"
          repo_digest=$(docker inspect --format='{{ index .RepoDigests 0 }}' "${{ steps.image.outputs.ref }}")
          echo "digest=${repo_digest#*@}" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        if: github.event.repository.private == false
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: [provision, build-sign-attest]
    environment: production
    env:
      RESOURCE_GROUP: ${{ github.event.inputs.resource_group || vars.AZURE_RESOURCE_GROUP || 'stayflow-rg-south' }}
      APP_LOCATION: ${{ vars.AZURE_APP_LOCATION || 'westus3' }}
      ENVIRONMENT_NAME: ${{ github.event.inputs.environment_name || vars.AZURE_ENVIRONMENT_NAME || 'stayflow-prod' }}
      CONTAINER_ENV_NAME: ${{ needs.provision.outputs.container_env_name }}
      CONTAINER_ENV_RESOURCE_GROUP: ${{ needs.provision.outputs.container_env_resource_group }}
      API_URL: ${{ vars.AZURE_API_URL }}
      WEB_URL: ${{ vars.AZURE_WEB_URL }}
      GHCR_AUTH_ENABLED: ${{ vars.GHCR_AUTH_ENABLED || 'true' }}
      GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.IMAGE_TAG }}

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate GHCR pull credentials
        run: |
          if [ "$GHCR_AUTH_ENABLED" = "true" ] && [ -z "$GHCR_READ_TOKEN" ]; then
            echo "GHCR_AUTH_ENABLED=true requires the GHCR_READ_TOKEN secret with read:packages."
            exit 1
          fi

      - name: Update migration job image
        uses: azure/cli@v2
        with:
          inlineScript: |
            owner="${GITHUB_REPOSITORY_OWNER,,}"
            if [ "$GHCR_AUTH_ENABLED" = "true" ]; then
              az containerapp job registry set \
                --resource-group "$RESOURCE_GROUP" \
                --name "$ENVIRONMENT_NAME-migrations" \
                --server "$IMAGE_REGISTRY" \
                --username "${{ vars.GHCR_USERNAME }}" \
                --password "${{ secrets.GHCR_READ_TOKEN }}" \
                --output none
            else
              az containerapp job registry remove \
                --resource-group "$RESOURCE_GROUP" \
                --name "$ENVIRONMENT_NAME-migrations" \
                --server "$IMAGE_REGISTRY" \
                --output none || true
            fi
            az containerapp job update \
              --resource-group "$RESOURCE_GROUP" \
              --name "$ENVIRONMENT_NAME-migrations" \
              --image "$IMAGE_REGISTRY/$owner/stayflow-migrations:${{ env.IMAGE_TAG }}" \
              --output none

      - name: Run migrations and seed before application rollout
        uses: azure/cli@v2
        with:
          inlineScript: |
            execution_name=$(az containerapp job start \
              --resource-group "$RESOURCE_GROUP" \
              --name "$ENVIRONMENT_NAME-migrations" \
              --query name \
              --output tsv)

            echo "Started migration job execution: $execution_name"

            for attempt in $(seq 1 120); do
              job_status=$(az containerapp job execution show \
                --resource-group "$RESOURCE_GROUP" \
                --name "$ENVIRONMENT_NAME-migrations" \
                --job-execution-name "$execution_name" \
                --query properties.status \
                --output tsv)

              echo "Migration job status: $job_status"
              if [ "$job_status" = "Succeeded" ]; then exit 0; fi
              if [ "$job_status" = "Failed" ] || [ "$job_status" = "Canceled" ]; then exit 1; fi
              sleep 10
            done

            echo "Migration job timed out waiting for completion."
            exit 1

      - name: Deploy immutable images
        uses: azure/cli@v2
        with:
          inlineScript: |
            owner="${GITHUB_REPOSITORY_OWNER,,}"
            az deployment group create \
              --resource-group "$RESOURCE_GROUP" \
              --template-file deploy/azure/apps.bicep \
              --parameters environmentName="$ENVIRONMENT_NAME" \
              --parameters location="$APP_LOCATION" \
              --parameters containerEnvName="$CONTAINER_ENV_NAME" \
              --parameters containerEnvResourceGroup="$CONTAINER_ENV_RESOURCE_GROUP" \
              --parameters neonConnectionString="${{ secrets.NEON_CONNECTION_STRING }}" \
              --parameters registryServer="$IMAGE_REGISTRY" \
              --parameters registryAuthenticationEnabled="$GHCR_AUTH_ENABLED" \
              --parameters registryUsername="${{ vars.GHCR_USERNAME || github.actor }}" \
              --parameters registryPassword="${{ secrets.GHCR_READ_TOKEN }}" \
              --parameters apiImage="$IMAGE_REGISTRY/$owner/stayflow-api:${{ env.IMAGE_TAG }}" \
              --parameters migrationImage="$IMAGE_REGISTRY/$owner/stayflow-migrations:${{ env.IMAGE_TAG }}" \
              --parameters webImage="$IMAGE_REGISTRY/$owner/stayflow-web:${{ env.IMAGE_TAG }}" \
              --parameters siteUrl="$WEB_URL" \
              --parameters oidcAuthority="$API_URL" \
              --parameters adminEmail="${{ secrets.STAYFLOW_ADMIN_EMAIL }}" \
              --parameters adminPassword="${{ secrets.STAYFLOW_ADMIN_PASSWORD }}" \
              --parameters serviceClientSecret="${{ secrets.STAYFLOW_SERVICE_CLIENT_SECRET }}" \
              --parameters minReplicas=0

      - name: Post-deployment smoke test
        env:
          STAGING_API_URL: ${{ vars.AZURE_API_URL }}
          SMOKE_CLIENT_ID: stayflow-service
          SMOKE_CLIENT_SECRET: ${{ secrets.STAYFLOW_SERVICE_CLIENT_SECRET }}
        run: |
          bash scripts/staging-smoke.sh
          curl -fsS "$WEB_URL" >/dev/null

      - name: Deployment summary
        run: |
          {
            echo "### Azure deployment - ${{ env.IMAGE_TAG }}"
            echo ""
            echo "| | URL |"
            echo "|---|---|"
            echo "| Web | $WEB_URL |"
            echo "| API | $API_URL |"
            echo ""
            echo "Images: GHCR | Security gates: Trivy, SBOM, SLSA provenance"
          } >> "$GITHUB_STEP_SUMMARY"
