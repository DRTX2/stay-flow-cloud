name: Deploy Azure

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      resource_group:
        description: Azure resource group
        required: false
        default: stayflow-rg-south
      location:
        description: Azure infrastructure region
        required: false
        default: southcentralus
      environment_name:
        description: Short environment name
        required: false
        default: stayflow-prod

# ── Permissions ────────────────────────────────────────────────────────────────
# contents:read      — checkout
# id-token:write     — OIDC login to Azure (Workload Identity Federation)
# packages:write     — push to GHCR (used only if ACR is unavailable)
# attestations:write — github/attest-build-provenance (SLSA provenance)
permissions:
  contents: read
  id-token: write
  attestations: write

concurrency:
  group: deploy-azure-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1: Provision cloud infrastructure (ACR, Postgres, Container Env).
  # Separated from the image jobs so infra changes don't re-scan images.
  # ────────────────────────────────────────────────────────────────────────────
  provision:
    name: Provision Infrastructure
    runs-on: ubuntu-latest
    environment: production
    env:
      RESOURCE_GROUP: ${{ github.event.inputs.resource_group || vars.AZURE_RESOURCE_GROUP || 'stayflow-rg-south' }}
      INFRA_LOCATION: ${{ github.event.inputs.location || vars.AZURE_INFRA_LOCATION || 'southcentralus' }}
      ENVIRONMENT_NAME: ${{ github.event.inputs.environment_name || vars.AZURE_ENVIRONMENT_NAME || 'stayflow-prod' }}
    outputs:
      acr_name: ${{ steps.infra.outputs.acr_name }}
      acr_login_server: ${{ steps.infra.outputs.acr_login_server }}
      identity_name: ${{ steps.infra.outputs.identity_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create resource group
        uses: azure/cli@v2
        with:
          inlineScript: az group create --name "$RESOURCE_GROUP" --location "$INFRA_LOCATION"

      - name: Provision infrastructure
        id: infra
        uses: azure/cli@v2
        with:
          inlineScript: |
            az deployment group create \
              --resource-group "$RESOURCE_GROUP" \
              --template-file deploy/azure/main.bicep \
              --parameters environmentName="$ENVIRONMENT_NAME" \
              --parameters location="$INFRA_LOCATION" \
              --output json > deployment.json
            echo "acr_name=$(jq -r '.properties.outputs.acrName.value' deployment.json)" >> "$GITHUB_OUTPUT"
            echo "acr_login_server=$(jq -r '.properties.outputs.acrLoginServer.value' deployment.json)" >> "$GITHUB_OUTPUT"
            echo "identity_name=$(jq -r '.properties.outputs.identityName.value' deployment.json)" >> "$GITHUB_OUTPUT"

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2: Build → Scan → SBOM → Sign → Attest each image.
  # The image is only pushed to ACR AFTER it passes the Trivy gate.
  # Supply-chain provenance is attached via SLSA attestation.
  # ────────────────────────────────────────────────────────────────────────────
  build-sign-attest:
    name: Build, Scan & Attest — ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: provision
    environment: production
    env:
      API_URL: ${{ vars.AZURE_API_URL }}
      WEB_URL: ${{ vars.AZURE_WEB_URL }}
    permissions:
      contents: read
      id-token: write       # Azure OIDC + Cosign keyless signing
      attestations: write   # github/attest-build-provenance SLSA provenance
    strategy:
      fail-fast: true       # If any image fails the security gate, abort all
      matrix:
        include:
          - name: api
            image: stayflow-api
            context: backend
            dockerfile: backend/StayFlow.Api/Dockerfile
            build_args: ''
          - name: web
            image: stayflow-web
            context: frontend
            dockerfile: frontend/Dockerfile
            build_args: |
              NEXT_PUBLIC_SITE_URL=${{ env.WEB_URL }}
              NEXT_PUBLIC_OIDC_AUTHORITY=${{ env.API_URL }}
          - name: migrations
            image: stayflow-migrations
            context: backend
            dockerfile: backend/StayFlow.MigrationHost/Dockerfile
            build_args: ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── STEP 1: Build ───────────────────────────────────────────────────────
      # Build first into the local daemon (load:true) for scanning.
      # We do NOT push yet — the image must pass the security gate first.
      - name: Build image (local, pre-scan)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          load: true
          push: false
          tags: ${{ matrix.image }}:${{ env.IMAGE_TAG }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=azure-${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=azure-${{ matrix.name }}

      # ── STEP 2: Security gate ───────────────────────────────────────────────
      # Trivy scans the built image for HIGH and CRITICAL vulnerabilities.
      # exit-code: '1' BLOCKS the pipeline — the image is never pushed if
      # this fails. This is the hard security gate before any deployment.
      - name: Trivy image scan (security gate — BLOCKING)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ matrix.image }}:${{ env.IMAGE_TAG }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

      # ── STEP 3: SBOM (Software Bill of Materials) ───────────────────────────
      # Generate a CycloneDX SBOM for the image. This documents every
      # package and dependency inside the container for supply-chain auditing,
      # license compliance, and future vulnerability tracking.
      - name: Generate SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ matrix.image }}:${{ env.IMAGE_TAG }}
          format: cyclonedx
          output: sbom-${{ matrix.name }}.cdx.json
          exit-code: '0'

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.name }}
          path: sbom-${{ matrix.name }}.cdx.json
          retention-days: 90

      # ── STEP 4: Push to ACR ─────────────────────────────────────────────────
      # Only reached if Trivy passed. Push the exact image that was scanned
      # (same digest) to Azure Container Registry.
      - name: Docker login to ACR
        run: |
          token=$(az acr login --name "${{ needs.provision.outputs.acr_name }}" --expose-token --query accessToken --output tsv)
          echo "$token" | docker login "${{ needs.provision.outputs.acr_login_server }}" \
            --username 00000000-0000-0000-0000-000000000000 \
            --password-stdin

      - name: Push image to ACR
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ needs.provision.outputs.acr_login_server }}/${{ matrix.image }}:${{ env.IMAGE_TAG }}
          build-args: ${{ matrix.build_args }}
          # Reuse the cached layers — no rebuild needed.
          cache-from: type=gha,scope=azure-${{ matrix.name }}

      # ── STEP 5: SLSA Provenance Attestation ────────────────────────────────
      # Attach a signed SLSA Build Provenance attestation to the image in ACR.
      # This proves: who built it, when, from which commit, with which workflow.
      # Consumers can verify the attestation with: cosign verify-attestation ...
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ needs.provision.outputs.acr_login_server }}/${{ matrix.image }}
          subject-digest: ${{ steps.push.outputs.digest }}
          # push-to-registry: false because ACR doesn't yet support OCI referrers
          # natively in all regions. The attestation is stored in GitHub's registry.
          push-to-registry: false

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3: Deploy — only runs after ALL images pass the security gate.
  # Uses the exact immutable digest from the push step.
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: [provision, build-sign-attest]
    environment: production
    env:
      RESOURCE_GROUP: ${{ github.event.inputs.resource_group || vars.AZURE_RESOURCE_GROUP || 'stayflow-rg-south' }}
      APP_LOCATION: ${{ vars.AZURE_APP_LOCATION || 'westus3' }}
      ENVIRONMENT_NAME: ${{ github.event.inputs.environment_name || vars.AZURE_ENVIRONMENT_NAME || 'stayflow-prod' }}
      CONTAINER_ENV_NAME: ${{ vars.AZURE_CONTAINER_ENV_NAME }}
      CONTAINER_ENV_RESOURCE_GROUP: ${{ vars.AZURE_CONTAINER_ENV_RESOURCE_GROUP || 'rg-app-container' }}
      API_URL: ${{ vars.AZURE_API_URL }}
      WEB_URL: ${{ vars.AZURE_WEB_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy immutable images
        uses: azure/cli@v2
        with:
          inlineScript: |
            az deployment group create \
              --resource-group "$RESOURCE_GROUP" \
              --template-file deploy/azure/apps.bicep \
              --parameters environmentName="$ENVIRONMENT_NAME" \
              --parameters location="$APP_LOCATION" \
              --parameters acrName="${{ needs.provision.outputs.acr_name }}" \
              --parameters containerEnvName="$CONTAINER_ENV_NAME" \
              --parameters containerEnvResourceGroup="$CONTAINER_ENV_RESOURCE_GROUP" \
              --parameters identityName="${{ needs.provision.outputs.identity_name }}" \
              --parameters neonConnectionString="${{ secrets.NEON_CONNECTION_STRING }}" \
              --parameters apiImage="${{ needs.provision.outputs.acr_login_server }}/stayflow-api:${{ env.IMAGE_TAG }}" \
              --parameters migrationImage="${{ needs.provision.outputs.acr_login_server }}/stayflow-migrations:${{ env.IMAGE_TAG }}" \
              --parameters webImage="${{ needs.provision.outputs.acr_login_server }}/stayflow-web:${{ env.IMAGE_TAG }}" \
              --parameters siteUrl="$WEB_URL" \
              --parameters oidcAuthority="$API_URL" \
              --parameters adminEmail="${{ secrets.STAYFLOW_ADMIN_EMAIL }}" \
              --parameters adminPassword="${{ secrets.STAYFLOW_ADMIN_PASSWORD }}" \
              --parameters serviceClientSecret="${{ secrets.STAYFLOW_SERVICE_CLIENT_SECRET }}" \
              --parameters minReplicas=0

      - name: Run migrations and seed
        uses: azure/cli@v2
        with:
          inlineScript: |
            az containerapp job start \
              --resource-group "$RESOURCE_GROUP" \
              --name "$ENVIRONMENT_NAME-migrations" \
              --wait

      - name: Deployment summary
        run: |
          echo "### ✅ Azure deployment — ${{ env.IMAGE_TAG }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | URL |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🌐 Web | $WEB_URL |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔌 API | $API_URL |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Security gates: Trivy ✅ | SBOM ✅ | SLSA Provenance ✅" >> "$GITHUB_STEP_SUMMARY"
