global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/prometheus-rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: stayflow-api
    metrics_path: /metrics
    static_configs:
      - targets: ["stayflow.api:8080"]
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]
