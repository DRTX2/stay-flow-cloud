groups:
  - name: stayflow-api
    rules:
      - alert: StayFlowApiHighErrorRate
        expr: sum(rate(http_server_request_duration_seconds_count{http_response_status_code=~"5.."}[5m])) / clamp_min(sum(rate(http_server_request_duration_seconds_count[5m])), 0.001) > 0.05
        for: 10m
        labels:
          severity: warning
          service: stayflow-api
        annotations:
          summary: StayFlow API 5xx rate exceeds 5%
      - alert: StayFlowOutboxBacklog
        expr: stayflow_outbox_pending_messages > 100
        for: 10m
        labels:
          severity: warning
          service: stayflow-api
        annotations:
          summary: StayFlow outbox has more than 100 pending messages
      - alert: StayFlowOutboxOldestMessage
        expr: stayflow_outbox_oldest_age_seconds > 300
        for: 5m
        labels:
          severity: critical
          service: stayflow-api
        annotations:
          summary: Oldest StayFlow outbox message is over five minutes old
      - alert: StayFlowJobFailures
        expr: sum(increase(stayflow_job_outcome_runs_total{outcome="failure"}[15m])) > 0
        labels:
          severity: warning
          service: stayflow-api
        annotations:
          summary: A StayFlow background job failed
