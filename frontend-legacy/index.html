<!doctype html>
<html lang="en" class="dark" suppressHydrationWarning>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="StayFlow Cloud — multi-tenant hospitality management platform."
    />
    <title>StayFlow Cloud</title>
    <script>
      // Apply the persisted theme before paint to avoid a flash of the wrong theme.
      (function () {
        try {
          var t = localStorage.getItem("stayflow.theme");
          var dark =
            t === "dark" ||
            ((!t || t === "system") &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.classList.toggle("dark", dark);
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
