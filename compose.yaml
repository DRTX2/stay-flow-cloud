name: stayflow

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: stayflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Message broker that carries integration events from the monolith's outbox relay to the
  # out-of-process consumers (e.g. the notification service). Management UI on :15672.
  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # One-shot database lifecycle job. Keeps schema changes out of API startup while preserving
  # a clean `docker compose up --build` experience on a fresh machine.
  migrate:
    image: stayflow.migrationhost
    build:
      context: ./backend
      dockerfile: StayFlow.MigrationHost/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      IsDevelopment: "true"
      STAYFLOW_MIGRATOR_CONNECTION: "Host=postgres;Port=5432;Database=stayflow;Username=postgres;Password=postgres"
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=stayflow;Username=postgres;Password=postgres"
      Authentication__ServiceClientSecret: "dev-service-secret-change-in-prod"
      Seeding__AdminEmail: "admin@stayflow.local"
      Seeding__AdminPassword: "Admin123$"
    entrypoint: ["sh", "-c", "dotnet StayFlow.MigrationHost.dll migrate && dotnet StayFlow.MigrationHost.dll seed"]

  stayflow.api:
    image: stayflow.api
    build:
      context: ./backend
      dockerfile: StayFlow.Api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=stayflow;Username=postgres;Password=postgres"
      ConnectionStrings__Redis: "redis:6379"
      ConnectionStrings__Mongo: "mongodb://mongo:27017"
      ConnectionStrings__RabbitMq: "amqp://guest:guest@rabbitmq:5672"
    ports:
      - "8080:8080"

  # Extracted microservice: consumes integration events off RabbitMQ and dispatches notifications.
  notification-service:
    image: stayflow.notificationservice
    build:
      context: ./backend
      dockerfile: StayFlow.NotificationService/Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__RabbitMq: "amqp://guest:guest@rabbitmq:5672"
    ports:
      - "8081:8080"

  # Scrapes the API's /metrics endpoint exposed by the OpenTelemetry Prometheus exporter.
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - stayflow.api

  # Pre-provisioned with the Prometheus datasource and the StayFlow API dashboard.
  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

  # Next.js BFF (public marketing/booking + authenticated dashboard). NEXT_PUBLIC_* are baked at
  # build time (browser-facing URLs); API_INTERNAL_URL is the server-to-server address on the
  # compose network.
  web:
    image: stayflow.web
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_SITE_URL: http://localhost:3000
        NEXT_PUBLIC_OIDC_AUTHORITY: http://localhost:8080
    depends_on:
      - stayflow.api
    environment:
      NODE_ENV: production
      API_INTERNAL_URL: http://stayflow.api:8080
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_OIDC_AUTHORITY: http://localhost:8080
    ports:
      - "3000:3000"

volumes:
  pgdata:
  mongodata:
